<html>
<head>
  <title>Registrasi</title>
  <style></style>
</head>
<body>
    <div class="form-container">
        <h1 style="color:teal ; font-weight:bolder;">LOKET PENDAFTARAN SANTRI BARU</h1>
        <p>Masukkan data di bawah ini dengan benar</p>
        <form action="">
            <fieldset>
                <legend>Biodata Diri</legend>
              
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text">
                </div>
              
                <div class="form-group">
                    <label>Jenis Kelamin</label>
                    <div class="radio-group">
                        <input type="radio" name="gender"> Laki-laki
                        <input type="radio" name="gender"> Perempuan
                    </div>
                  
                </div>
                <div class="form-group">
                    <label>Tempat Lahir</label>
                    <input type="text">
                </div>
              
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date">
                </div>
              
              <div class="form-group">
                    <label>Nomor Telepon</label>
                    <input type="tel" name="no_hp" pattern="08[0-9]{8,11}">
                </div>
              
            </fieldset>
            
            <fieldset>
                <legend>Alamat Lengkap</legend>
                <div class="form-group">
                    <label>Provinsi</label>
                    <select>
                        <option>--Pilih Provinsi--</option>
                        <option value="banten">Banten</option>
                        <option value="jawa">Jawa</option>
                        <option value="sumatra">Sumatra</option>
                      <option>NTB</option>
                    </select>
                </div>
              
                <div class="form-group">
                    <label>Kota</label>
                    <select>
                        <option>--Pilih Kota--</option>
                        <option>TANGERANG</option>
                        <option>Yogyakarta</option>
                        <option>Palembang</option>
                  <option>KLATEN</option>    
         <option>PANDEGLANG</option>             <option>KEP.RIAU</option>
                    </select>
                </div>
              
                <div class="form-group">
                    <label>Alamat</label>
                    <textarea></textarea>
            
                </div>
            </fieldset>
            
            <fieldset>
                <legend>Akun</legend>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Alamat email aktif">
                </div>
              
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" placeholder="Maksimal 10 karakter">
                </div>
              
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Masukkan password">
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" placeholder="Masukkan kembali password">
                </div>
            </fieldset>
            
            <fieldset>
                <legend>Syarat dan Ketentuan</legend>
                <p>Dengan memilih "Setuju", Anda sudah mengikuti <a href="#">Syarat dan Ketentuan</a> yang berlaku</p>
                <div class="checkbox-group">
                    <input type="checkbox"> Setuju
                </div>
              
                <br>
              
            </fieldset>
           <div style="text-align: left;">
                     <a href="gabut2.html">
                    <button type="button">Daftar</button>
                    </a>
                    <button type="reset">Reset</button>
                </div>
                <style>
        .form-container {
            width: 100%;
            height: 0px;
            margin: auto;
        }
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .form-group label {
            width: 150px;
            text-align: left;
            margin-right: 10px;
        }
        .form-group input, .form-group select, .form-group textarea {
            flex: auto;
        }
        .radio-group {
            display: flex;
            align-items: center;
        }
        .radio-group input {
            margin-left: 10px;
        }
        .checkbox-group {
            margin-top: 10px;
        }
        button {
            margin: 5px;
        }
    </style>
        </form>
    </div>
</body>
</html>
